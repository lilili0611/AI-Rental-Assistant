<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" type="image/png" href="/static/mascot.png" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>猫猫头相机租赁 · 租客自助下单</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Sora:wght@600;700;800&family=Nunito:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Caveat:wght@600&display=swap');
  :root{
    --bg:#FFF8F0; --bg-rgb:255,248,240; --surface:#fff; --surface-2:#FFF3E8;
    --ink:#2D2D2D; --ink-rgb:45,45,45; --ink-2:#6B6B6B; --ink-3:#A89F97;
    --brand:#FF3366; --brand-rgb:255,51,102; --brand-700:#E0254F; --brand-50:#FFE6EC;
    --gold:#FFD700; --mint:#00CC88; --mint-rgb:0,204,136;
    --ok:#00CC88; --ok-50:#E6FAF2; --warn:#FF9F1C; --warn-50:#FFF1DD; --danger:#FF3366; --danger-50:#FFE6EC;
    --line:#FFE0CC; --line-2:#FFD0B0;
    --sh-sm:0 3px 10px rgba(var(--brand-rgb),.10); --sh-md:0 10px 26px rgba(var(--brand-rgb),.22); --sh-lg:0 14px 32px rgba(var(--ink-rgb),.20);
    --bounce:cubic-bezier(.34,1.56,.64,1); --ease:cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Nunito","Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
       background:var(--bg);color:var(--ink);font-size:15px;line-height:1.7;letter-spacing:.02em;-webkit-font-smoothing:antialiased}
  h1,h2,h3{margin:0;line-height:1.2;letter-spacing:0;font-family:"ZCOOL KuaiLe","Sora","Noto Sans SC",sans-serif;font-weight:400}
  .tnum{font-variant-numeric:tabular-nums}
  .ic{width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.125em;flex:none}
  /* header */
  header{position:sticky;top:0;z-index:20;overflow:hidden;border-bottom:2px solid var(--line);
    background:linear-gradient(110deg,#FFF1E6,#FFF8F0 45%,#FFEDE3)}
  header::before,header::after{content:"";position:absolute;border-radius:50%;filter:none;opacity:.5;pointer-events:none}
  header::before{width:160px;height:160px;background:radial-gradient(circle,rgba(var(--brand-rgb),.18),transparent 70%);top:-70px;right:8%}
  header::after{width:140px;height:140px;background:radial-gradient(circle,rgba(var(--mint-rgb),.16),transparent 70%);bottom:-80px;left:18%}
  .hbar{max-width:1160px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:relative}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .mark{width:54px;height:56px;display:grid;place-items:center;flex:none}
  .logo h1{font-size:22px;color:var(--brand)}.logo .sub{font-size:12px;color:var(--ink-2);font-family:"Caveat",cursive;font-size:15px}
  .login{display:flex;gap:8px;align-items:center}
  .who{font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:6px}
  .who .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-3)}
  .who.on .dot{background:var(--mint);box-shadow:0 0 0 4px var(--ok-50)}
  /* controls */
  input,select,button{font-size:14px;font-family:inherit;letter-spacing:.02em}
  input,select{height:46px;padding:0 14px;border:2px solid var(--line-2);border-radius:14px;background:#fff;color:var(--ink);outline:none;transition:.2s var(--ease);font-weight:600}
  select{padding-right:30px}
  input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-50)}
  button{cursor:pointer;border:none;border-radius:999px;height:46px;padding:0 22px;background:var(--brand);color:#fff;font-weight:700;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.2s var(--bounce);white-space:nowrap;box-shadow:0 6px 16px rgba(var(--brand-rgb),.30)}
  button:hover{background:var(--brand-700);transform:translateY(-2px) scale(1.03)}
  button:active{transform:translateY(0) scale(.97)}
  button:focus-visible{outline:none;box-shadow:0 0 0 4px var(--brand-50)}
  button.ghost{background:#fff;color:var(--brand);border:2px solid var(--brand);box-shadow:none}
  button.ghost:hover{background:var(--brand-50)}
  button.sm{height:38px;padding:0 16px;font-size:13px;font-weight:700}
  button.danger{background:#fff;color:var(--danger);border:2px solid var(--danger);box-shadow:none}
  button.danger:hover{background:var(--danger-50)}
  button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  /* layout */
  .wrap{max-width:1160px;margin:0 auto;padding:22px 20px;display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}
  .wrap>div{min-width:0}
  @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  .card{background:var(--surface);border:2px solid var(--line);border-radius:22px;padding:22px;box-shadow:var(--sh-sm);margin-bottom:20px}
  .reveal{opacity:0;transform:translateY(16px) scale(.98)}
  .reveal.in{opacity:1;transform:none;transition:opacity .5s var(--ease),transform .5s var(--bounce)}
  .sechead{display:flex;align-items:center;gap:11px;margin-bottom:16px;flex-wrap:wrap;row-gap:8px}
  .sechead .n{width:30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;font-size:15px;font-weight:700;display:grid;place-items:center;flex:none;font-family:"Sora",sans-serif;box-shadow:0 4px 10px rgba(var(--brand-rgb),.3)}
  .sechead h2{font-size:20px}.sechead .sp{flex:1}
  .muted{color:var(--ink-3)}
  /* device grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
  .cam{position:relative;border:2px solid var(--line);border-radius:20px;padding:13px;cursor:pointer;background:var(--surface);transition:.25s var(--bounce);
    opacity:0;transform:translateY(14px) scale(.92);animation:pop .5s var(--bounce) forwards}
  .cam:hover{border-color:var(--brand);transform:translateY(-5px) rotate(-.6deg);box-shadow:var(--sh-md)}
  .cam.sel{border-color:var(--brand);background:var(--brand-50)}
  .cam.sel .pick{opacity:1;transform:scale(1)}
  .cam .pick{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:13px;opacity:0;transform:scale(.4);transition:.3s var(--bounce);box-shadow:0 3px 8px rgba(var(--brand-rgb),.4)}
  .cam .thumb{height:100px;border-radius:16px;display:grid;place-items:center;margin-bottom:11px;color:#fff;
    background:linear-gradient(135deg,#FF7A59,var(--brand))}
  .cam:nth-child(3n) .thumb{background:linear-gradient(135deg,#34D399,var(--mint))}
  .cam:nth-child(3n+2) .thumb{background:linear-gradient(135deg,#FFD93D,#FF9F1C)}
  .cam .thumb .ic{font-size:42px;stroke-width:1.6}
  .cam .nm{font-weight:700;line-height:1.35}
  .cam .meta{color:var(--ink-2);font-size:12px;margin-top:3px}
  .cam .price{color:var(--brand);font-weight:700;font-size:14px;margin-top:8px}
  /* order form */
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;font-weight:700;color:var(--ink-2)}
  .quote{background:var(--surface-2);border:2px solid var(--line);border-radius:18px;padding:18px;margin-top:16px;display:none}
  .quote.show{display:block;animation:pop .35s var(--bounce)}
  .qhead{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:16px;font-weight:700}
  .quote table{width:100%;border-collapse:collapse;font-size:14px}
  .quote td{padding:5px 0;color:var(--ink-2)}.quote td:last-child{text-align:right;color:var(--ink);font-weight:700}
  .quote .total{display:flex;justify-content:space-between;align-items:baseline;margin-top:14px;padding-top:14px;border-top:2px dashed var(--line-2)}
  .quote .total .big{font-size:30px;font-weight:800;color:var(--brand);font-family:"Sora",sans-serif}
  .hint{font-size:12px;color:var(--ink-3);margin-top:12px;line-height:1.7}
  /* chips */
  .chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700}
  .chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
  .chip.ok{background:var(--ok-50);color:#0a7a52}.chip.no{background:var(--danger-50);color:var(--brand-700)}.chip.warn{background:var(--warn-50);color:#a85f08}
  /* orders */
  .o{border:2px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:10px;transition:.2s var(--ease)}
  .o:hover{border-color:var(--line-2);box-shadow:var(--sh-sm)}
  .o .top{display:flex;justify-content:space-between;align-items:center}
  .o .oid{font-weight:700}.o .sub{color:var(--ink-2);font-size:13px;margin-top:6px}
  /* chat */
  .chat{position:sticky;top:88px;display:flex;flex-direction:column;height:calc(100vh - 110px);min-height:440px}
  .msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px}
  .bub{max-width:86%;padding:11px 14px;border-radius:18px;white-space:pre-wrap;font-size:14px;line-height:1.6;animation:pop .25s var(--bounce);font-weight:500}
  .bub.u{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:6px}
  .bub.a{align-self:flex-start;background:var(--surface-2);color:var(--ink);border-bottom-left-radius:6px}
  .bub .intent{font-size:11px;opacity:.65;margin-bottom:4px}
  .acts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chatbar{display:flex;gap:8px;margin-top:10px}.chatbar input{flex:1}
  .typing{align-self:flex-start;color:var(--ink-3);font-size:13px;display:flex;align-items:center;gap:7px;padding:2px}
  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;
    padding:13px 22px;border-radius:999px;opacity:0;transition:.3s var(--bounce);z-index:99;pointer-events:none;box-shadow:var(--sh-lg);max-width:90vw;font-weight:700}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @keyframes pop{to{opacity:1;transform:none}}
  .spin{display:inline-block;width:15px;height:15px;border:2.5px solid var(--brand-50);border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){
    *,header{animation:none!important;transition:opacity .2s ease!important}
    .reveal,.cam{opacity:1!important;transform:none!important}
    button:hover,.cam:hover{transform:none}
  }
	  @media(max-width:600px){
	    .hbar{padding:11px 14px}.wrap{padding:16px 14px}
	    .login input{width:132px}.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
	    .quote .total .big{font-size:24px}.logo h1{font-size:19px}
	  }
</style>
</head>

<header>
  <div class="hbar">
    <div class="logo">
      <div class="mark"><img src="/static/mascot.png" alt="猫猫头" style="width:52px;height:52px;object-fit:contain"></div>
      <div><h1>猫猫头相机租赁</h1><div class="sub">白猫陪你拍，租得超开心 🐾</div></div>
    </div>
	    <div class="login">
	      <span class="who" id="who"><span class="dot"></span>未登录</span>
	      <input id="email" type="email" placeholder="邮箱" value="demo@example.com" style="width:190px" aria-label="邮箱" />
	      <input id="password" type="password" placeholder="密码" value="demo1234" style="width:120px" aria-label="密码" onkeydown="if(event.key==='Enter')login()" />
	      <button onclick="login()">登录</button>
	      <button class="ghost" onclick="register()">注册</button>
	    </div>
  </div>
</header>

<div class="wrap">
  <div>
    <div class="card reveal">
      <div class="sechead"><span class="n">1</span><h2>挑一台相机</h2><div class="sp"></div><span style="display:flex;align-items:center;gap:6px;color:var(--brand)"><img src="/static/mascot.png" alt="猫猫" style="width:32px;height:32px;object-fit:contain"><span style="font-family:'Caveat',cursive;font-size:18px">喵～慢慢挑</span></span></div>
      <div class="grid" id="cams"><span class="muted"><span class="spin"></span> 加载设备中…</span></div>
    </div>

    <div class="card reveal" id="cfgCard" style="display:none">
      <div class="sechead"><span class="n">2</span><h2>配置与租期</h2><div class="sp"></div><span class="muted" id="cfgFor"></span></div>
      <div class="field" style="margin-bottom:14px"><label>配置</label><select id="cfg" onchange="clearQuote()"></select></div>
      <div class="row">
        <div class="field"><label>起租日</label><input type="date" id="start" onchange="clearQuote()"/></div>
        <div class="field"><label>还机日</label><input type="date" id="end" onchange="clearQuote()"/></div>
        <div class="field"><label>数量</label><input type="number" id="qty" value="1" min="1" style="width:78px" onchange="clearQuote()"/></div>
        <button class="ghost" onclick="checkQuote()" id="quoteBtn">查库存 & 算价格</button>
      </div>
      <div class="quote" id="quote"></div>
      <div class="hint">计价：1–2 天按两天价 ｜ 3 天按三天价 ｜ 超过 3 天 = 三天价 + 续租×(天数−3) ｜ 天数含起含止。</div>
    </div>

    <div class="card reveal">
      <div class="sechead"><span class="n">3</span><h2>我的订单</h2><div class="sp"></div>
        <button class="ghost sm" onclick="loadOrders()"><svg class="ic"><use href="#i-refresh"/></svg>刷新</button></div>
      <div id="orders"><span class="muted">登录后查看你的订单</span></div>
    </div>
  </div>

  <div class="card chat reveal">
    <div class="sechead"><span class="n" style="background:transparent;box-shadow:none;width:38px;height:38px"><img src="/static/mascot.png" alt="猫猫" style="width:38px;height:38px;object-fit:contain"></span><h2>猫猫小助手</h2></div>
    <div class="msgs" id="msgs">
      <div class="bub a">喵～我是你的全流程陪伴助手 🐱 我会先了解拍摄场景，再帮你选设备、查库存、问免押并带入下单；发货后还能查看物流、使用指南和归还提醒。</div>
    </div>
    <div class="chatbar">
      <input id="chatin" placeholder="想租点啥？问我吧…" onkeydown="if(event.key==='Enter')send()" aria-label="聊天输入"/>
      <button onclick="send()" aria-label="发送"><svg class="ic"><use href="#i-send"/></svg></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
let USER=JSON.parse(localStorage.getItem('rental_user')||'null'),SESSION=null,CAMS=[],SELCAM=null,CONFIGS=[];
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function hdrs(json){return json?{'Content-Type':'application/json'}:{};}
function fmt(n){return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function errOf(d){return (d&&d.detail&&(d.detail.error||d.detail.details))||(d&&d.detail)||'操作失败';}
function icon(id){return `<svg class="ic"><use href="#${id}"/></svg>`;}
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.08});
function observeReveal(){document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));}
(function initDates(){const d=new Date(),a=new Date(d.getTime()+7*864e5),b=new Date(d.getTime()+9*864e5);
  const iso=x=>x.toISOString().slice(0,10);$('start').value=iso(a);$('end').value=iso(b);})();

function setUser(d){
  USER=d;localStorage.setItem('rental_user',JSON.stringify(USER));
  const w=$('who');w.className='who on';w.innerHTML='<span class="dot"></span>'+esc(USER.name||USER.email)+' · '+esc(USER.role);
}
function clearUser(){
  USER=null;localStorage.removeItem('rental_user');
  $('who').className='who';$('who').innerHTML='<span class="dot"></span>未登录';
}
async function login(){
  const email=$('email').value.trim();const password=$('password').value;
  if(!email||!password)return toast('请输入邮箱和密码');
  try{const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();if(!r.ok)return toast('登录失败：'+errOf(d));
    setUser(d);toast('登录成功，欢迎你 🎉');loadOrders();}catch(e){toast('登录失败');}
}
async function register(){
  const email=$('email').value.trim();const password=$('password').value;
  if(!email||!password)return toast('请输入邮箱和密码');
  try{const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();if(!r.ok)return toast('注册失败：'+errOf(d));
    setUser(d);toast('注册成功，已登录');loadOrders();}catch(e){toast('注册失败');}
}
function restoreUser(){
  if(!USER)return;
  const w=$('who');w.className='who on';w.innerHTML='<span class="dot"></span>'+esc(USER.name||USER.email)+' · '+esc(USER.role);
  if(USER.email)$('email').value=USER.email;
}
async function loadCams(){
  try{const d=await (await fetch('/api/cameras?limit=100')).json();CAMS=d.data;
    $('cams').innerHTML=CAMS.map((c,i)=>`<div class="cam" id="cam-${c.id}" tabindex="0" onclick="selCam('${c.id}')" onkeydown="if(event.key==='Enter')selCam('${c.id}')" style="animation-delay:${i*55}ms">
      <span class="pick">${icon('i-check')}</span>
      <div class="thumb">${icon('i-cam')}</div>
      <div class="nm">${esc(c.name)}</div><div class="meta">${esc(c.brand||'')}</div>
      <div class="price tnum">两天 ¥${fmt(c.daily_price)} 起</div></div>`).join('');
  }catch(e){$('cams').innerHTML='<span class="muted">设备加载失败，请确认服务运行中</span>';}
}
async function selCam(id){
  SELCAM=id;document.querySelectorAll('.cam').forEach(e=>e.classList.remove('sel'));$('cam-'+id).classList.add('sel');
  const d=await (await fetch('/api/cameras/'+id)).json();CONFIGS=d.configurations;$('cfgFor').textContent=d.name;
  $('cfg').innerHTML=CONFIGS.map(c=>`<option value="${esc(c.id)}">${esc(c.config_name)} · 两天¥${fmt(c.two_day_price)} / 三天¥${fmt(c.three_day_price)} / 续租¥${fmt(c.extra_day_price)}/天</option>`).join('');
  $('cfgCard').style.display='block';observeReveal();clearQuote();$('cfgCard').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function clearQuote(){$('quote').classList.remove('show');}
async function checkQuote(){
  const cfg=$('cfg').value,s=$('start').value,e=$('end').value,qty=+$('qty').value;
  if(!cfg||!s||!e)return toast('请选择配置和日期');if(e<s)return toast('还机日不能早于起租日');
  const btn=$('quoteBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> 查询中';
  try{
    const inv=await (await fetch(`/api/inventory/available?start_date=${s}&end_date=${e}&camera_config_id=${cfg}`)).json();
    const res=(inv.results||[])[0];const avail=res?res.min_available_in_range:0;const enough=avail>=qty;
    const pr=await (await fetch(`/api/pricing/calculate?camera_config_id=${cfg}&start_date=${s}&end_date=${e}`)).json();
    if(pr.error||pr.detail)return toast(errOf(pr));
    const p=pr.pricing,days=pr.rental_period.days,dep=Number(pr.deposit),rent=Number(p.rent)*qty;
    const depRow=dep>0?`<tr><td>押金展示 ¥${fmt(dep)} × ${qty}件（无需支付）</td><td>¥${fmt(dep*qty)}</td></tr>`:'';
    $('quote').innerHTML=`
      <div class="qhead">租期 ${days} 天
        ${enough?`<span class="chip ok"><span class="d"></span>有货 · 可租 ${avail} 台</span>`:`<span class="chip no"><span class="d"></span>库存不足 · 仅 ${avail} 台</span>`}</div>
      <table class="tnum">
        <tr><td>计价方式</td><td>${p.basis}</td></tr>
        <tr><td>租金 × ${qty}件</td><td>¥${fmt(rent)}</td></tr>${depRow}
      </table>
      <div class="total"><span class="muted">应付租金${dep>0?'（押金不计入应付）':''}</span><span class="big tnum">¥${fmt(rent)}</span></div>
      <button style="margin-top:16px;width:100%" ${enough?'':'disabled'} onclick="placeOrder()">${enough?icon('i-check')+'立即下单':'库存不足，无法下单'}</button>`;
    $('quote').classList.add('show');
  }catch(err){toast('查询失败');}finally{btn.disabled=false;btn.textContent='查库存 & 算价格';}
}
async function placeOrder(){
  if(!USER)return toast('请先在右上角登录');
  const cfg=$('cfg').value,s=$('start').value,e=$('end').value,qty=+$('qty').value;
  const r=await fetch('/api/orders',{method:'POST',headers:hdrs(true),body:JSON.stringify({items:[{camera_config_id:cfg,quantity:qty}],rental_start:s,rental_end:e})});
  const d=await r.json();if(!r.ok)return toast('下单失败：'+errOf(d));
  toast('下单成功 🎉 '+d.order_id);clearQuote();loadOrders();
  addBub('a','你的订单 '+d.order_id+' 已创建（待支付），应付租金 ¥'+fmt(d.total_price)+'，押金展示 ¥'+fmt(d.deposit)+'（无需支付）。\n'+d.payment_instruction);
}
// 颜色分档: 取消=红, 完结=绿, 其余=黄(进行中)。文案用后端返回的 display_status。
function stChip(o){const s=o.status;const cls=s==='cancelled'?'no':(s==='completed'?'ok':'warn');return `<span class="chip ${cls}"><span class="d"></span>${esc(o.display_status||s)}</span>`;}
async function loadOrders(){
  if(!USER){$('orders').innerHTML='<span class="muted">登录后查看你的订单</span>';return;}
  const r=await fetch('/api/orders',{headers:hdrs()});
  if(r.status===401){clearUser();$('orders').innerHTML='<span class="muted">登录已失效，请重新登录</span>';return;}
  const d=await r.json();const list=d.data||[];
  if(!list.length){$('orders').innerHTML='<span class="muted">还没有订单，去上面挑一台吧 🛒</span>';return;}
  $('orders').innerHTML=list.map(o=>`<div class="o">
    <div class="top"><span class="oid">${esc(o.order_id)}</span>${stChip(o)}</div>
    <div class="sub tnum">租期 ${esc(o.rental_start)} ~ ${esc(o.rental_end)}　·　应付租金 ¥${fmt(o.total_price)}　·　押金展示 ¥${fmt(o.deposit)}（无需支付）</div>
    ${o.tracking_no?`<div class="sub tnum">物流：${esc(o.carrier||'')} ${esc(o.tracking_no)}</div>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
      ${o.status!=='cancelled'?`<button class="ghost sm" onclick="showCompanion('${o.order_id}')">🐾 陪伴服务</button>`:''}
      ${o.status==='completed'?`<button class="ghost sm" onclick="submitFeedback('${o.order_id}')">⭐ 评价与分享</button>`:''}
      ${o.status==='pending_payment'?`<button class="danger sm" onclick="cancelOrder('${o.order_id}',${o.version})">取消订单</button>`:''}
    </div>
  </div>`).join('');
}
async function cancelOrder(id,ver){
  if(!confirm('确认取消订单 '+id+'？'))return;
  const r=await fetch(`/api/orders/${id}?version=${ver}`,{method:'DELETE',headers:hdrs()});const d=await r.json();
  if(!r.ok)return toast('取消失败：'+errOf(d));toast('已取消，手续费 ¥'+fmt(d.cancellation_fee));loadOrders();
}
function addBub(role,text,intent,acts){
  const m=document.createElement('div');m.className='bub '+(role==='u'?'u':'a');
  m.innerHTML=(intent?`<div class="intent">意图：${esc(intent)}</div>`:'')+esc(text).replace(/\n/g,'<br>');
  if(acts&&acts.length){const w=document.createElement('div');w.className='acts';
    acts.forEach(a=>{const b=document.createElement('button');b.className='ghost sm';b.textContent=a.label;b.onclick=()=>onAct(a);w.appendChild(b);});m.appendChild(w);}
  $('msgs').appendChild(m);$('msgs').scrollTop=$('msgs').scrollHeight;
}
async function onAct(a){
  if(a.action==='prefill_order'){
    const p=a.payload||{};if(!p.camera_id||!p.config_id)return toast('下单信息不完整，请重新咨询');
    await selCam(p.camera_id);$('cfg').value=p.config_id;$('start').value=p.start_date;$('end').value=p.end_date;$('qty').value=p.quantity||1;
    $('cfgCard').scrollIntoView({behavior:'smooth',block:'start'});await checkQuote();toast('已带入设备和租期，请核对后点击立即下单');
  }else if(a.action==='open_url'){
    const url=(a.payload||{}).url||'';
    if(/^https:\/\//.test(url)||/^\/static\/[A-Za-z0-9._/-]+$/.test(url))window.open(url,'_blank','noopener');
  }else if(a.action==='order_create')toast('请在左侧选择配置和日期，点“立即下单”');
  else if(a.action.startsWith('confirm:'))send('确认');else send(a.label);
}
async function showCompanion(id){
  try{
    const r=await fetch(`/api/orders/${id}/companion`);const d=await r.json();if(!r.ok)return toast(errOf(d));
    const log=d.logistics||{},ret=d.return_guide||{},guides=d.device_guides||[],events=d.events||[];
    const guideText=guides.map(g=>`${g.name}：${g.summary}\n上手：${g.quick_start.join('；')}\n设置：${g.setting_tips.join('；')}`).join('\n\n');
    const eventText=events.filter(e=>e.status==='unread').map(e=>`🔔 ${e.title}：${e.message}`).join('\n');
    const text=`当前阶段：${d.phase_label}\n物流：${log.carrier||'待填写'} ${log.tracking_no||''}\n${log.notice}\n\n${guideText||'设备指南将在发货后提供'}\n\n归还：${ret.message}\n${ret.packing_tip}${eventText?'\n\n'+eventText:''}`;
    const acts=[];const official=guides.find(g=>g.guide_url);if(official)acts.push({label:'打开官方指南',action:'open_url',payload:{url:official.guide_url}});
    if(ret.outlet_query_url)acts.push({label:'腾讯地图查顺丰网点',action:'open_url',payload:{url:ret.outlet_query_url}});
    addBub('a',text,'全流程陪伴',acts);
    events.filter(e=>e.status==='unread').forEach(e=>fetch(`/api/orders/${id}/companion/events/${e.id}/read`,{method:'POST'}));
  }catch(e){toast('陪伴信息加载失败');}
}
async function submitFeedback(id){
  const raw=prompt('请给本次体验打分（1-5星）','5');if(raw===null)return;const rating=Number(raw);
  if(!Number.isInteger(rating)||rating<1||rating>5)return toast('评分请输入1到5的整数');
  const comment=prompt('想对设备或服务说些什么？（可留空）','')||'';
  const share=prompt('可选：粘贴使用该设备拍摄的作品链接；留空则不分享','')||'';
  const body={rating,comment,share_url:share||null,showcase_allowed:!!share&&confirm('是否授权在猫猫头作品社区公开展示该链接？')};
  try{const r=await fetch(`/api/orders/${id}/feedback`,{method:'POST',headers:hdrs(true),body:JSON.stringify(body)});const d=await r.json();if(!r.ok)return toast(errOf(d));toast('谢谢你的评价，猫猫头收到啦 🐾');loadOrders();}catch(e){toast('评价提交失败');}
}
async function send(forced){
  const txt=forced||$('chatin').value.trim();if(!txt)return;if(!forced)$('chatin').value='';addBub('u',txt);
  const tip=document.createElement('div');tip.className='typing';tip.innerHTML='<span class="spin"></span> 猫猫思考中…';
  $('msgs').appendChild(tip);$('msgs').scrollTop=$('msgs').scrollHeight;
  try{const d=await (await fetch('/api/chat',{method:'POST',headers:hdrs(true),body:JSON.stringify({session_id:SESSION,message:txt})})).json();
    tip.remove();SESSION=d.session_id;addBub('a',d.ai_response,d.detected_intent+' · '+d.confidence,d.next_actions);
  }catch(e){tip.remove();addBub('a','哎呀，网络开小差了，再试一次～');}
}
restoreUser();loadCams();loadOrders();observeReveal();setInterval(()=>{if(USER)loadOrders();},60000);
</script>
</body>
